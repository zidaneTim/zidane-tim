site_name: Zidane TIM - Cours & Formations
site_description: Cours et ressources pédagogiques pour les élèves du réseau CNEAP
site_url: https://zidane.github.io/zidane-tim/
repo_url: https://github.com/zidane/zidane-tim
repo_name: zidane-tim

theme:
  name: material
  language: fr
  palette:
    - scheme: light
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: dark
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode sombre

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

plugins:
  - search:
      lang: fr

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.superfences
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Cours:
    - Collège (4e · 3e): cours/college/index.md
    - CAPa SAPVER:
      - Présentation: cours/capa-sapver/index.md
      - SQ05 Phishing (MG1): cours/capa-sapver/activites/sq05-phishing.md
    - Bac Pro SAPAT:
      - Présentation: cours/sapat/index.md
      - C1.2 Données numériques: cours/sapat/c12-donnees-numeriques.md
      - C8.1/C8.2 Cadre de vie: cours/sapat/c81-c82-cadre-de-vie.md
  - Formations IA: cours/formations-ia/index.md
  - Ressources: ressources/index.md
