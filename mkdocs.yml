site_name: Zidane TIM
site_description: Cours et activités numériques — Lycée Xavier Grall, Loudéac
site_url: https://zidanetim.github.io/zidane-tim/
copyright: Lycée Xavier Grall — Loudéac · Réseau CNEAP

theme:
  name: material
  language: fr
  icon:
    logo: material/school
    repo: fontawesome/brands/github
  font:
    text: DM Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tooltips

plugins:
  - search:
      lang: fr

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: Sur cette page

extra_css:
  - assets/style.css

extra:
  social:
    - icon: material/school
      link: https://zidanetim.github.io/zidane-tim/
      name: Accueil du site

nav:
  - Accueil: index.md
  - Collège:
      - 4e — Mathématiques: cours/college/4e-maths.md
      - 3e — EPI STM: cours/college/3e-epi-stm.md
  - CAPa SAPVER:
      - MG1 — Vie sociale (1ère année): cours/capa-sapver/mg1-vie-sociale.md
      - MP2 — Communication pro (2e année): cours/capa-sapver/mp2-communication-pro.md
  - Bac Pro SAPAT:
      - EG1 — Sciences / Maths / Numérique (2nde): cours/sapat/eg1-sciences-maths-numerique.md
      - EG4 — Vivre et agir ensemble (2nde): cours/sapat/eg4-vivre-ensemble.md
      - C1.2 — Données numériques (1ère): cours/sapat/c12-donnees-numeriques.md
      - C8.1 / C8.2 — Cadre de vie (1ère · Term): cours/sapat/c81-c82-cadre-de-vie.md
  - Ressources: ressources/index.md

